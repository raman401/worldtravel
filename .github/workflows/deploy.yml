name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-worldtravel-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Next.js via PM2
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail

            cd /var/www/worldtravel

            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then . "$NVM_DIR/nvm.sh"; fi
            nvm use --lts || true

            command -v node >/dev/null 2>&1 || { echo "node not found in PATH"; exit 1; }
            command -v npm >/dev/null 2>&1 || { echo "npm not found in PATH"; exit 1; }

            git fetch origin main
            git reset --hard origin/main

            npm ci
            npm run build

            pm2 restart worldtravel || pm2 start npm --name worldtravel -- start
            pm2 save

            curl -f http://127.0.0.1:3000/api/health || true

# Troubleshooting
# - Permission denied (publickey) during `git fetch` on the server:
#   1) Add a deploy key (or SSH key) with repo read access for the server user.
#   2) OR switch the repo remote to HTTPS and use a PAT/token for pulls.
