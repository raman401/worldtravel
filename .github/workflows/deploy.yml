name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="/var/www/worldtravel"
            APP_NAME="worldtravel"
            REPO_URL="https://github.com/devopsca85/worldtravel.git"

            mkdir -p "${APP_DIR}"
            cd "${APP_DIR}"

            # Clone once if repo is not initialized
            if [ ! -d ".git" ]; then
              git clone "${REPO_URL}" .
            fi

            # Load nvm only if present (never fail)
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
            fi

            git fetch origin main
            git reset --hard origin/main

            npm ci
            npm run build

            if pm2 describe "${APP_NAME}" >/dev/null 2>&1; then
              pm2 restart "${APP_NAME}" --update-env
            else
              pm2 start npm --name "${APP_NAME}" -- start
            fi
            pm2 save

            curl -f http://127.0.0.1:3000/api/health || true
