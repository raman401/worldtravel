name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-worldtravel-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Next.js via PM2
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail

            cd /var/www/worldtravel

            export NVM_DIR="$HOME/.nvm"
            if [[ -f "$NVM_DIR/nvm.sh" ]]; then
              . "$NVM_DIR/nvm.sh"
              nvm use --lts || true
            fi

            command -v node >/dev/null 2>&1 || { echo "node not found in PATH"; exit 1; }
            command -v npm >/dev/null 2>&1 || { echo "npm not found in PATH"; exit 1; }
            command -v pm2 >/dev/null 2>&1 || { echo "pm2 not found in PATH"; exit 1; }

            node --version
            npm --version

            git fetch --prune origin main
            git reset --hard origin/main

            npm ci
            npm run build

            pm2 restart worldtravel || pm2 start npm --name worldtravel -- start
            pm2 save

            curl -f http://127.0.0.1:3000/api/health || true

# Troubleshooting
# - "Permission denied (publickey)" during `git fetch` on the server:
#   1) Add a deploy key (or SSH key) with read access for the server user/repo.
#   2) OR switch the repo remote to HTTPS and use a token (PAT/GitHub App token).
