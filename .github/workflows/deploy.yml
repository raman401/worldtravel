name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
      env:
        SSH_HOST: ${{ secrets.SSH_HOST }}
        SSH_PORT: ${{ secrets.SSH_PORT }}
        SSH_USER: ${{ secrets.SSH_USER }}
        SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      run: |
        sudo apt-get update
        sudo apt-get install -y sshpass

        sshpass -p "$SSH_PASSWORD" ssh -p "$SSH_PORT" -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          cd /var/www/worldtravel
          git fetch origin main
          git reset --hard origin/main
          npm ci
          npm run build
          pm2 restart worldtravel || pm2 start npm --name worldtravel -- start

          # Optional health check
          curl -f http://127.0.0.1:3000/api/health || true
        EOF
